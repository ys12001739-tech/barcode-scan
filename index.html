<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>商品詳細＆実績照会システム</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <!-- OCRライブラリ (Tesseract.js) の読み込み -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 8px; background: #f1f5f9; text-align: center; color: #1e293b; overflow-x: hidden; }
    .card { background: white; padding: 12px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); width: 100%; max-width: 500px; margin: 0 auto; overflow: hidden; }
    h2 { font-size: 1.05em; color: #0f172a; margin: 0 0 10px 0; }
    
    /* カメラ表示領域 */
    #reader { width: 100%; max-height: 220px; border-radius: 8px; overflow: hidden; margin-bottom: 8px; background: #000; display: flex; align-items: center; justify-content: center; position: relative; }
    #reader video { object-fit: cover !important; height: 220px !important; }
    
    /* OCR・手入力切替タブ / ボタン */
    .mode-switch-group { display: flex; gap: 6px; margin-bottom: 8px; display: none; }
    .btn-mode { flex: 1; background: #475569; color: white; border: none; padding: 8px; font-size: 0.85rem; border-radius: 6px; font-weight: bold; cursor: pointer; }
    .btn-mode.active { background: #0284c7; }

    /* 手入力・テキストスキャン入力フォーム */
    .manual-input-group { display: flex; gap: 6px; margin-bottom: 10px; display: none; }
    .manual-input-group input { flex: 1; padding: 10px; font-size: 1rem; border-radius: 6px; border: 1px solid #cbd5e1; outline: none; -webkit-appearance: none; }
    .manual-input-group button { background: #0f172a; color: white; border: none; padding: 10px 14px; font-size: 1rem; border-radius: 6px; font-weight: bold; cursor: pointer; white-space: nowrap; }

    .result-box { text-align: left; background: #f8fafc; border: 1px solid #cbd5e1; padding: 10px; border-radius: 8px; margin-top: 6px; display: none; width: 100%; }
    .detail-grid { width: 100%; table-layout: fixed; border-collapse: collapse; font-size: 0.8em; margin-bottom: 10px; }
    .detail-grid th { background: #e2e8f0; color: #334155; text-align: left; padding: 6px; width: 35%; border: 1px solid #cbd5e1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .detail-grid td { background: #fff; color: #0f172a; padding: 6px; border: 1px solid #cbd5e1; font-weight: bold; word-wrap: break-word; overflow-wrap: break-word; }
    .val-highlight { color: #2563eb; font-size: 1.05em; }

    .auto-order-group { background: #ecfdf5; border: 1px solid #a7f3d0; padding: 8px; border-radius: 6px; margin-bottom: 10px; font-size: 0.85em; }
    .auto-order-grid { width: 100%; border-collapse: collapse; }
    .auto-order-grid th { text-align: left; color: #065f46; width: 40%; padding: 4px; border-bottom: 1px dashed #a7f3d0; }
    .auto-order-grid td { text-align: right; font-weight: bold; color: #047857; padding: 4px; border-bottom: 1px dashed #a7f3d0; }

    .table-container { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; margin-top: 6px; border: 1px solid #cbd5e1; border-radius: 4px; background: #fff; }
    .history-table { width: 100%; min-width: 400px; border-collapse: collapse; font-size: 0.75em; }
    .history-table th, .history-table td { border: 1px solid #cbd5e1; padding: 6px 4px; text-align: center; white-space: nowrap; }
    .history-table th { background: #f1f5f9; color: #475569; font-weight: bold; }
    .history-table td { background: #fff; }
    .row-title { background: #f8fafc !important; font-weight: bold; color: #475569; text-align: left !important; padding-left: 6px !important; position: sticky; left: 0; z-index: 2; border-right: 2px solid #cbd5e1; }

    #status { font-weight: bold; margin: 6px 0; color: #2563eb; font-size: 0.85em; min-height: 1.2em; }
    .btn-main { background: #2563eb; color: white; border: none; padding: 12px; font-size: 1em; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; box-shadow: 0 2px 4px rgba(37,99,235,0.2); }
    .btn-next { background: #475569; color: white; border: none; padding: 10px; font-size: 0.9em; border-radius: 6px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 12px; }
    .loading-spinner { font-size: 0.8em; color: #d97706; font-weight: bold; }
    
    .filter-group { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; background: #e0f2fe; padding: 6px 8px; border-radius: 6px; border: 1px solid #bae6fd; }
    select { padding: 4px 6px; font-size: 0.85rem; font-weight: bold; border-radius: 4px; border: 1px solid #94a3b8; color: #0f172a; outline: none; max-width: 50%; }
  </style>
</head>
<body>

<div class="card">
  <h2>無音スキャナー（詳細＆実績照会）</h2>
  
  <div id="status">⚡️ マスタ初期化中...</div>
  
  <!-- カメラ領域 -->
  <div id="reader" style="display:none;"></div>
  
  <!-- モード切替ボタン (バーコード優先 / OCR文字読み取り) -->
  <div id="mode-switch-group" class="mode-switch-group">
    <button id="btn-mode-bc" class="btn-mode active" onclick="switchMode('barcode')">📷 バーコード自動スキャン</button>
    <button id="btn-mode-ocr" class="btn-mode" onclick="switchMode('ocr')">🔍 文字(数字)をスキャン認識</button>
  </div>

  <!-- 手入力フォーム -->
  <div id="manual-input-group" class="manual-input-group">
    <input type="tel" id="manual-code" placeholder="コードを直接入力" onkeypress="handleKeyPress(event)">
    <button type="button" onclick="submitManualInput()">検索</button>
  </div>

  <button id="start-btn" class="btn-main" style="display:none;" onclick="startScan()">📷 カメラ起動（スキャン開始）</button>

  <!-- 結果表示領域 -->
  <div id="result-box" class="result-box">
    
    <!-- 店舗絞り込みフィルタ -->
    <div class="filter-group">
      <div style="font-size:0.85em; font-weight:bold; color:#1e40af;">🏪 参照店舗の選択</div>
      <select id="store-filter" onchange="updateViewByStore()">
      </select>
    </div>

    <!-- 自動発注データ領域 -->
    <div class="auto-order-group">
      <div style="font-weight:bold; color:#065f46; margin-bottom:4px;">🛒 店舗ごとの自動発注情報</div>
      <table class="auto-order-grid">
        <tr><th>通路番号</th><td id="ao-aisle">-</td></tr>
        <tr><th>最大陳列数</th><td id="ao-max">-</td></tr>
        <tr><th>発注点</th><td id="ao-point">-</td></tr>
      </table>
    </div>

    <table class="detail-grid">
      <tr><th>読取コード</th><td id="res-scan-code" class="val-highlight" style="color:#64748b;">-</td></tr>
      <tr><th>マスタキー</th><td id="res-code" class="val-highlight">-</td></tr>
      <tr><th>商品名</th><td id="res-name">-</td></tr>
      <tr><th>メーカー名</th><td id="res-maker">-</td></tr>
      <tr><th>規格</th><td id="res-spec">-</td></tr>
      <tr><th>部門グループ</th><td id="res-dept">-</td></tr>
      <tr><th>系</th><td id="res-kei">-</td></tr>
      <tr><th>大分類</th><td id="res-dai">-</td></tr>
      <tr><th>ライン</th><td id="res-line">-</td></tr>
      <tr><th>クラス</th><td id="res-cls">-</td></tr>
      <tr><th>メーカーコード</th><td id="res-makercode">-</td></tr>
      <tr><th>原価 / 売価</th><td id="res-price">-</td></tr>
    </table>

    <div style="font-size:0.85em; font-weight:bold; color:#1e40af; margin-top:10px;">📊 日別販売実績 (直近7日)</div>
    <div id="history-status" class="loading-spinner">実績データを照会中...</div>
    
    <div class="table-container" id="table-container" style="display:none;">
      <table class="history-table">
        <thead><tr id="history-header"></tr></thead>
        <tbody>
          <tr id="history-qty-row"></tr>
          <tr id="history-sales-row"></tr>
        </tbody>
      </table>
    </div>
    
    <button class="btn-next" onclick="resumeScan()">次をスキャン</button>
  </div>
</div>

<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbwutOT1LXPm8FGtY5auzTMQbMBa8hyQd7sP8Ku5QLMgmwMoi2FShslBF6DNyiEpI7dC/exec";
  
  let html5QrCode;
  let itemMasterMap = {};
  let autoOrderMap = {}; 
  
  let isProcessing = true; 
  let currentScanCode = null;
  let currentHistoryMap = {}; 
  let currentMode = "barcode"; // barcode または ocr
  let ocrTimer = null;

  const storeNameMap = {
    "1704": "首里", "1898": "栄町", "1899": "国場", "1900": "天久",
    "1901": "普天間", "1904": "三原", "1905": "浦西", "1906": "浦添",
    "1908": "西町", "1909": "大平", "1910": "食品館", "1911": "豊崎"
  };

  window.addEventListener('DOMContentLoaded', () => {
    const storeFilter = document.getElementById("store-filter");
    storeFilter.innerHTML = '<option value="ALL">全店舗合計</option>';
    Object.keys(storeNameMap).forEach(code => {
      storeFilter.appendChild(new Option(storeNameMap[code] + "店", code));
    });

    fetch(GAS_URL)
      .then(res => res.json())
      .then(data => {
        if (data.success && data.itemMasterMap) {
          itemMasterMap = data.itemMasterMap;
          autoOrderMap = data.autoOrderMap || {}; 

          document.getElementById('status').innerText = "✅ 準備完了！カメラを起動してください";
          document.getElementById('start-btn').style.display = 'block';
        } else {
          document.getElementById('status').innerText = "❌ マスタ読み込み失敗";
        }
      })
      .catch(err => {
        document.getElementById('status').innerText = "❌ 通信エラーが発生しました";
      });
  });

  function startScan() {
    document.getElementById('start-btn').style.display = 'none';
    document.getElementById('reader').style.display = 'flex';
    document.getElementById('mode-switch-group').style.display = 'flex';
    document.getElementById('manual-input-group').style.display = 'flex';
    document.getElementById('status').innerText = "カメラ起動中...";
    
    isProcessing = true; 

    if (!html5QrCode) {
      html5QrCode = new Html5Qrcode("reader");
    }

    const config = { fps: 10 };

    html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
      .then(() => {
        document.getElementById('status').innerText = "バーコードにかざすか、文字(数字)にかざしてください";
        isProcessing = false;
        startOcrLoop(); // 💡 OCR読み取りループ開始
      })
      .catch(err => { 
        document.getElementById('status').innerText = "カメラ未起動（コード直接入力が可能です）"; 
        isProcessing = false; 
      });
  }

  function switchMode(mode) {
    currentMode = mode;
    document.getElementById('btn-mode-bc').classList.toggle('active', mode === 'barcode');
    document.getElementById('btn-mode-ocr').classList.toggle('active', mode === 'ocr');
    
    if (mode === 'ocr') {
      document.getElementById('status').innerText = "🔍 文字(数字)にかざしてください...解析中";
    } else {
      document.getElementById('status').innerText = "📷 バーコードにかざしてください";
    }
  }

  /* 💡 アプリ内リアルタイムOCR文字解析ループ */
  function startOcrLoop() {
    if (ocrTimer) clearInterval(ocrTimer);
    ocrTimer = setInterval(async () => {
      if (isProcessing || currentMode !== 'ocr') return;

      const videoElement = document.querySelector("#reader video");
      if (!videoElement || videoElement.readyState !== 4) return;

      try {
        // カメラの現在のコマ（フレーム）をキャプチャ
        const canvas = document.createElement("canvas");
        canvas.width = videoElement.videoWidth;
        canvas.height = videoElement.videoHeight;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(videoElement, 0, 0, canvas.width, canvas.height);

        // OCR解析（数字専用モード）
        const result = await Tesseract.recognize(canvas, 'eng', {
          tessedit_char_whitelist: '0123456789'
        });

        const text = result.data.text ? result.data.text.trim() : "";
        const matches = text.match(/\d{8,13}/g);

        if (matches && matches.length > 0 && !isProcessing && currentMode === 'ocr') {
          let foundCode = matches.find(m => m.length === 13) || matches[0];
          document.getElementById('status').innerText = `🔍 検出コード: ${foundCode}`;
          processCodeSearch(foundCode);
        }
      } catch (e) {
        console.warn("OCR解析エラー:", e);
      }
    }, 1200); // 1.2秒周期でカメラ枠の文字をチェック
  }

  function handleKeyPress(e) {
    if (e.key === 'Enter') {
      submitManualInput();
    }
  }

  function submitManualInput() {
    const manualInput = document.getElementById("manual-code");
    const rawVal = manualInput.value ? manualInput.value.trim() : "";
    if (!rawVal) return;

    manualInput.blur();
    isProcessing = false;

    const matches = rawVal.match(/\d{8,13}/g);
    if (matches && matches.length > 0) {
      let bestMatch = matches.find(m => m.length === 13) || matches[0];
      processCodeSearch(bestMatch);
    } else {
      processCodeSearch(rawVal);
    }
  }

  function onScanSuccess(decodedText) {
    if (isProcessing) return;
    if (currentMode === 'barcode') {
      processCodeSearch(decodedText);
    }
  }

  /* 💡 照会処理 */
  function processCodeSearch(inputText) {
    isProcessing = true; 
    
    if (html5QrCode) {
      try { html5QrCode.pause(); } catch(e) {}
    }
    
    const rawCode = String(inputText).trim();
    const digitsOnly = rawCode.replace(/[^0-9]/g, ''); 
    
    if (!digitsOnly) {
      document.getElementById('status').innerText = "⚠️ 正しい商品コード（数字）が検出できませんでした";
      isProcessing = false;
      return;
    }

    const numOnly = String(Number(digitsOnly || '0'));
    const padded13 = digitsOnly.padStart(13, '0');
    
    let searchCodes = [
      numOnly, 
      digitsOnly, 
      padded13, 
      rawCode
    ];

    if (padded13.startsWith("02") || padded13.startsWith("2")) {
      const instore13 = padded13.substring(0, 8) + "00000"; 
      searchCodes.push(String(Number(instore13))); 
      searchCodes.push(instore13);
    }

    let found = null;
    for (let c of searchCodes) {
      if (itemMasterMap[c]) {
        found = itemMasterMap[c];
        break;
      }
    }

    if (found) {
      document.getElementById('reader').style.display = 'none';
      document.getElementById('mode-switch-group').style.display = 'none';
      document.getElementById('manual-input-group').style.display = 'none';
      
      document.getElementById('res-scan-code').innerText = rawCode;
      document.getElementById('res-code').innerText = found.code;
      document.getElementById('res-name').innerText = found.name;
      document.getElementById('res-maker').innerText = found.makerName;
      document.getElementById('res-spec').innerText = found.spec;
      document.getElementById('res-dept').innerText = found.deptGroup;
      document.getElementById('res-kei').innerText = found.kei;
      document.getElementById('res-dai').innerText = found.dai;
      document.getElementById('res-line').innerText = found.line;
      document.getElementById('res-cls').innerText = found.cls;
      document.getElementById('res-makercode').innerText = found.makerCode;
      
      const costStr = found.cost ? `¥${Number(found.cost).toLocaleString()}` : "未設定";
      const priceStr = found.price ? `¥${Number(found.price).toLocaleString()}` : "未設定";
      document.getElementById('res-price').innerText = `${costStr} / ${priceStr}`;

      document.getElementById('status').innerText = "商品情報を取得しました";
      document.getElementById('result-box').style.display = "block";

      currentScanCode = found.code;

      updateViewByStore(true);
      fetchProductHistory(found.code);
    } else {
      document.getElementById('status').innerText = "未登録コード: " + rawCode;
      setTimeout(() => { 
        document.getElementById('status').innerText = "バーコードにかざすか、文字(数字)にかざしてください";
        if (html5QrCode) { try { html5QrCode.resume(); } catch(e){} }
        isProcessing = false; 
      }, 1500);
    }
  }

  function updateViewByStore(skipHistoryRender = false) {
    if (!currentScanCode) return;
    
    const storeVal = document.getElementById("store-filter").value;
    
    let aoData = { aisle: "-", max: "-", point: "-" };
    if (storeVal !== "ALL") {
      const cleanStore = storeVal.replace(/^0+/, ''); 
      const aoStoreData = autoOrderMap[cleanStore] || autoOrderMap[storeVal] || autoOrderMap["00" + cleanStore];
      
      if (aoStoreData) {
        const c1 = currentScanCode;
        const c2 = String(Number(currentScanCode));
        const c3 = currentScanCode.padStart(13, '0');
        
        let instore13 = null;
        if (c3.startsWith("02") || c3.startsWith("2")) {
          instore13 = c3.substring(0, 8) + "00000"; 
        }

        aoData = aoStoreData[c1] || aoStoreData[c2] || aoStoreData[c3] || (instore13 && aoStoreData[String(Number(instore13))]) || { aisle: "-", max: "-", point: "-" };
      }
    }
    document.getElementById("ao-aisle").innerText = aoData.aisle || "-";
    document.getElementById("ao-max").innerText = aoData.max || "-";
    document.getElementById("ao-point").innerText = aoData.point || "-";

    if (!skipHistoryRender && currentHistoryMap) {
      let targetHistory = null;
      if (currentHistoryMap[storeVal]) {
        targetHistory = currentHistoryMap[storeVal];
      } else {
        const paddedStore = storeVal.padStart(6, '0');
        if (currentHistoryMap[paddedStore]) {
          targetHistory = currentHistoryMap[paddedStore];
        } else {
          const keys = Object.keys(currentHistoryMap);
          const matchKey = keys.find(k => k.replace(/^0+/, '') === storeVal.replace(/^0+/, ''));
          if (matchKey) targetHistory = currentHistoryMap[matchKey];
        }
      }

      if (!targetHistory && currentHistoryMap["ALL"]) {
        targetHistory = currentHistoryMap["ALL"].map(item => ({
          displayDate: item.displayDate,
          qty: 0,
          sales: 0
        }));
      }
      renderHistoryTable(targetHistory || []);
    }
  }

  function fetchProductHistory(code) {
    const historyStatus = document.getElementById('history-status');
    const tableContainer = document.getElementById('table-container');
    
    historyStatus.style.display = "block";
    historyStatus.innerText = "⏳ 実績を一括照会中...";
    tableContainer.style.display = "none";

    fetch(`${GAS_URL}?code=${encodeURIComponent(code)}`)
      .then(res => res.json())
      .then(data => {
        if (data.success && data.historyMap) {
          currentHistoryMap = data.historyMap;
          updateViewByStore();
          historyStatus.style.display = "none";
          tableContainer.style.display = "block";
        } else {
          historyStatus.innerText = "⚠️ 失敗しました";
        }
      })
      .catch(err => {
        historyStatus.innerText = "⚠️ 通信エラー";
      });
  }

  function renderHistoryTable(historyArray) {
    if (!historyArray) return;
    const headerTr = document.getElementById('history-header');
    const qtyTr = document.getElementById('history-qty-row');
    const salesTr = document.getElementById('history-sales-row');
    
    headerTr.innerHTML = "<th style='position: sticky; left: 0; z-index: 2; border-right: 2px solid #cbd5e1;'>日付</th>";
    qtyTr.innerHTML = "<td class='row-title'>数量(点)</td>";
    salesTr.innerHTML = "<td class='row-title'>売上(円)</td>";

    historyArray.forEach(item => {
      const th = document.createElement('th');
      th.innerText = item.displayDate;
      headerTr.appendChild(th);

      const tdQty = document.createElement('td');
      tdQty.className = "qty-val";
      tdQty.innerText = item.qty.toLocaleString();
      qtyTr.appendChild(tdQty);

      const tdSales = document.createElement('td');
      tdSales.className = "sales-val";
      tdSales.innerText = item.sales > 0 ? `¥${item.sales.toLocaleString()}` : "¥0";
      salesTr.appendChild(tdSales);
    });
  }

  function resumeScan() {
    document.getElementById('result-box').style.display = "none";
    document.getElementById('reader').style.display = 'flex';
    document.getElementById('mode-switch-group').style.display = 'flex';
    document.getElementById('manual-input-group').style.display = 'flex';
    document.getElementById('manual-code').value = ""; 
    document.getElementById('status').innerText = "バーコードにかざすか、文字(数字)にかざしてください";
    
    setTimeout(() => {
      if (html5QrCode) {
        try { html5QrCode.resume(); } catch(e) {}
      }
      isProcessing = false; 
    }, 500);
  }
</script>

</body>
</html>
