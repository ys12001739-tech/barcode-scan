<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>商品詳細＆実績照会システム</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 8px; background: #f1f5f9; text-align: center; color: #1e293b; overflow-x: hidden; }
    .card { background: white; padding: 12px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); width: 100%; max-width: 500px; margin: 0 auto; overflow: hidden; }
    h2 { font-size: 1.05em; color: #0f172a; margin: 0 0 10px 0; }
    
    #reader { width: 100%; max-height: 220px; border-radius: 8px; overflow: hidden; margin-bottom: 10px; background: #000; display: flex; align-items: center; justify-content: center; }
    #reader video { object-fit: cover !important; height: 220px !important; }
    
    .result-box { text-align: left; background: #f8fafc; border: 1px solid #cbd5e1; padding: 10px; border-radius: 8px; margin-top: 6px; display: none; width: 100%; }
    .detail-grid { width: 100%; table-layout: fixed; border-collapse: collapse; font-size: 0.8em; margin-bottom: 10px; }
    .detail-grid th { background: #e2e8f0; color: #334155; text-align: left; padding: 6px; width: 35%; border: 1px solid #cbd5e1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .detail-grid td { background: #fff; color: #0f172a; padding: 6px; border: 1px solid #cbd5e1; font-weight: bold; word-wrap: break-word; overflow-wrap: break-word; }
    .val-highlight { color: #2563eb; font-size: 1.05em; }

    .table-container { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; margin-top: 6px; border: 1px solid #cbd5e1; border-radius: 4px; background: #fff; }
    .history-table { width: 100%; min-width: 400px; border-collapse: collapse; font-size: 0.75em; }
    .history-table th, .history-table td { border: 1px solid #cbd5e1; padding: 6px 4px; text-align: center; white-space: nowrap; }
    .history-table th { background: #f1f5f9; color: #475569; font-weight: bold; }
    .history-table td { background: #fff; }
    .row-title { background: #f8fafc !important; font-weight: bold; color: #475569; text-align: left !important; padding-left: 6px !important; position: sticky; left: 0; z-index: 2; border-right: 2px solid #cbd5e1; }
    .qty-val { color: #0f172a; font-weight: bold; }
    .sales-val { color: #059669; font-weight: bold; }

    #status { font-weight: bold; margin: 6px 0; color: #2563eb; font-size: 0.85em; min-height: 1.2em; }
    .btn-main { background: #2563eb; color: white; border: none; padding: 12px; font-size: 1em; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; box-shadow: 0 2px 4px rgba(37,99,235,0.2); }
    .btn-next { background: #475569; color: white; border: none; padding: 10px; font-size: 0.9em; border-radius: 6px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 12px; }
    .loading-spinner { font-size: 0.8em; color: #d97706; font-weight: bold; }
    
    .filter-group { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; background: #e0f2fe; padding: 6px 8px; border-radius: 6px; border: 1px solid #bae6fd; }
    select { padding: 4px 6px; font-size: 0.85rem; font-weight: bold; border-radius: 4px; border: 1px solid #94a3b8; color: #0f172a; outline: none; max-width: 50%; }
  </style>
</head>
<body>

<div class="card">
  <h2>無音スキャナー（詳細＆実績照会）</h2>
  
  <div id="status">⚡️ 商品マスタ初期化中...</div>
  <div id="reader" style="display:none;"></div>
  
  <button id="start-btn" class="btn-main" style="display:none;" onclick="startScan()">📷 カメラ起動（スキャン開始）</button>

  <div id="result-box" class="result-box">
    <table class="detail-grid">
      <tr><th>スキャンコード</th><td id="res-scan-code" class="val-highlight" style="color:#64748b;">-</td></tr>
      <tr><th>マスタ登録JAN</th><td id="res-code" class="val-highlight">-</td></tr>
      <tr><th>商品名</th><td id="res-name">-</td></tr>
      <tr><th>メーカー名</th><td id="res-maker">-</td></tr>
      <tr><th>規格</th><td id="res-spec">-</td></tr>
      <tr><th>部門グループ</th><td id="res-dept">-</td></tr>
      <tr><th>系</th><td id="res-kei">-</td></tr>
      <tr><th>大分類</th><td id="res-dai">-</td></tr>
      <tr><th>ライン</th><td id="res-line">-</td></tr>
      <tr><th>クラス</th><td id="res-cls">-</td></tr>
      <tr><th>メーカーコード</th><td id="res-makercode">-</td></tr>
      <tr><th>原価 / 売価</th><td id="res-price">-</td></tr>
    </table>

    <div class="filter-group">
      <div style="font-size:0.85em; font-weight:bold; color:#1e40af;">📊 日別販売実績 (直近7日)</div>
      <select id="store-filter" onchange="refetchHistory()">
        <option value="ALL">全店舗合計</option>
      </select>
    </div>

    <div id="history-status" class="loading-spinner">実績データを照会中...</div>
    
    <div class="table-container" id="table-container" style="display:none;">
      <table class="history-table">
        <thead><tr id="history-header"></tr></thead>
        <tbody>
          <tr id="history-qty-row"></tr>
          <tr id="history-sales-row"></tr>
        </tbody>
      </table>
    </div>
    
    <button class="btn-next" onclick="resumeScan()">次をスキャン</button>
  </div>
</div>

<script>
  // ★GASのURLに書き換えてください
  const GAS_URL = "https://script.google.com/macros/s/AKfycbwutOT1LXPm8FGtY5auzTMQbMBa8hyQd7sP8Ku5QLMgmwMoi2FShslBF6DNyiEpI7dC/exec";
  
  let html5QrCode;
  let itemMasterMap = {};
  
  let isProcessing = true; 
  let currentScanCode = null;
  let currentHistoryMap = {}; 
  let appStoreList = [];

  // 店舗名を綺麗に変換する関数
  function getStoreName(code) {
    if (code === "ALL") return "全店舗合計";
    const cleanCode = code.replace(/^0+/, '');
    const found = appStoreList.find(s => s.code === code || s.code === cleanCode || s.code.replace(/^0+/, '') === cleanCode);
    return found ? found.name.replace("店", "") + "店" : code + "店";
  }

  window.addEventListener('DOMContentLoaded', () => {
    fetch(GAS_URL)
      .then(res => res.json())
      .then(data => {
        if (data.success && data.itemMasterMap) {
          itemMasterMap = data.itemMasterMap;
          appStoreList = data.storeList || [];

          document.getElementById('status').innerText = "✅ 準備完了！カメラを起動してください";
          document.getElementById('start-btn').style.display = 'block';
        } else {
          document.getElementById('status').innerText = "❌ マスタ読み込み失敗";
        }
      })
      .catch(err => {
        document.getElementById('status').innerText = "❌ 通信エラーが発生しました";
      });
  });

  function startScan() {
    document.getElementById('start-btn').style.display = 'none';
    document.getElementById('reader').style.display = 'flex';
    document.getElementById('status').innerText = "カメラを起動中...";
    
    isProcessing = true; 

    if (!html5QrCode) {
      html5QrCode = new Html5Qrcode("reader");
    }

    const config = { fps: 10 };

    html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
      .then(() => {
        document.getElementById('status').innerText = "バーコードにかざしてください";
        isProcessing = false;
      })
      .catch(err => { 
        document.getElementById('status').innerText = "カメラエラー: " + err; 
      });
  }

  function onScanSuccess(decodedText) {
    if (isProcessing) return;
    isProcessing = true; // 💡 スキャンした瞬間に即座にロックをかける
    
    // 💡 裏で別のコードを読まないようにカメラ映像を一時停止
    if (html5QrCode) {
      try { html5QrCode.pause(); } catch(e) {}
    }
    
    const rawCode = String(decodedText).trim();
    const digitsOnly = rawCode.replace(/[^0-9]/g, '');
    const numOnly = String(Number(digitsOnly || '0'));
    const padded13 = digitsOnly.padStart(13, '0');
    
    // 💡 短縮JAN（8桁）や輸入UPC（12桁）などあらゆる桁の揺れを吸収する候補を生成
    let searchCodes = [
      digitsOnly, 
      numOnly, 
      padded13, 
      rawCode,
      digitsOnly.padStart(8, '0'),  // 短縮JANとしてのゼロ埋め
      digitsOnly.padStart(12, '0')  // UPCコードとしてのゼロ埋め
    ];

    // インストアコード（不定貫）の特別対応
    if (padded13.startsWith("02") || padded13.startsWith("2")) {
      const instore13 = padded13.substring(0, 8) + "00000"; 
      searchCodes.push(instore13);
      searchCodes.push(String(Number(instore13)));
    }

    let found = null;
    for (let c of searchCodes) {
      if (itemMasterMap[c]) {
        found = itemMasterMap[c];
        break;
      }
    }

    if (found) {
      document.getElementById('reader').style.display = 'none';
      
      document.getElementById('res-scan-code').innerText = rawCode;
      document.getElementById('res-code').innerText = found.code;
      document.getElementById('res-name').innerText = found.name;
      document.getElementById('res-maker').innerText = found.makerName;
      document.getElementById('res-spec').innerText = found.spec;
      document.getElementById('res-dept').innerText = found.deptGroup;
      document.getElementById('res-kei').innerText = found.kei;
      document.getElementById('res-dai').innerText = found.dai;
      document.getElementById('res-line').innerText = found.line;
      document.getElementById('res-cls').innerText = found.cls;
      document.getElementById('res-makercode').innerText = found.makerCode;
      
      const costStr = found.cost ? `¥${Number(found.cost).toLocaleString()}` : "未設定";
      const priceStr = found.price ? `¥${Number(found.price).toLocaleString()}` : "未設定";
      document.getElementById('res-price').innerText = `${costStr} / ${priceStr}`;

      document.getElementById('status').innerText = "商品情報を取得しました";
      document.getElementById('result-box').style.display = "block";

      fetchProductHistory(found.code);
    } else {
      document.getElementById('status').innerText = "未登録コード: " + rawCode;
      setTimeout(() => { 
        document.getElementById('status').innerText = "バーコードにかざしてください";
        if (html5QrCode) { try { html5QrCode.resume(); } catch(e){} }
        isProcessing = false; 
      }, 1500);
    }
  }

  function refetchHistory() {
    const storeFilter = document.getElementById("store-filter").value;
    if (currentHistoryMap && currentHistoryMap[storeFilter]) {
      renderHistoryTable(currentHistoryMap[storeFilter]);
    }
  }

  function fetchProductHistory(code) {
    currentScanCode = code;
    const store = document.getElementById('store-filter').value;
    
    const historyStatus = document.getElementById('history-status');
    const tableContainer = document.getElementById('table-container');
    
    historyStatus.style.display = "block";
    historyStatus.innerText = "⏳ 実績を一括照会中...";
    tableContainer.style.display = "none";

    fetch(`${GAS_URL}?code=${encodeURIComponent(code)}`)
      .then(res => res.json())
      .then(data => {
        if (data.success && data.historyMap) {
          currentHistoryMap = data.historyMap;
          
          const storeFilter = document.getElementById("store-filter");
          const currentVal = storeFilter.value;
          storeFilter.innerHTML = "";
          
          const availableStores = Object.keys(currentHistoryMap).sort();
          if (availableStores.includes("ALL")) {
            storeFilter.appendChild(new Option(getStoreName("ALL"), "ALL"));
          }
          availableStores.forEach(st => {
            if (st !== "ALL") storeFilter.appendChild(new Option(getStoreName(st), st));
          });

          if (availableStores.includes(currentVal)) storeFilter.value = currentVal;

          renderHistoryTable(currentHistoryMap[storeFilter.value]);
          
          historyStatus.style.display = "none";
          tableContainer.style.display = "block";
        } else {
          historyStatus.innerText = "⚠️ 失敗しました";
        }
      })
      .catch(err => {
        historyStatus.innerText = "⚠️ 通信エラー";
      });
  }

  function renderHistoryTable(historyArray) {
    if (!historyArray) return;
    const headerTr = document.getElementById('history-header');
    const qtyTr = document.getElementById('history-qty-row');
    const salesTr = document.getElementById('history-sales-row');
    
    headerTr.innerHTML = "<th style='position: sticky; left: 0; z-index: 2; border-right: 2px solid #cbd5e1;'>日付</th>";
    qtyTr.innerHTML = "<td class='row-title'>数量(点)</td>";
    salesTr.innerHTML = "<td class='row-title'>売上(円)</td>";

    historyArray.forEach(item => {
      const th = document.createElement('th');
      th.innerText = item.displayDate;
      headerTr.appendChild(th);

      const tdQty = document.createElement('td');
      tdQty.className = "qty-val";
      tdQty.innerText = item.qty.toLocaleString();
      qtyTr.appendChild(tdQty);

      const tdSales = document.createElement('td');
      tdSales.className = "sales-val";
      tdSales.innerText = item.sales > 0 ? `¥${item.sales.toLocaleString()}` : "¥0";
      salesTr.appendChild(tdSales);
    });
  }

  // 💡 「次をスキャン」を押した時の安全な再開処理
  function resumeScan() {
    // まず画面上の要素をカメラモードに切り替える
    document.getElementById('result-box').style.display = "none";
    document.getElementById('reader').style.display = 'flex';
    document.getElementById('status').innerText = "バーコードにかざしてください";
    
    // 💡 画面が切り替わってから少しだけディレイ（0.5秒）を入れてカメラを再開（誤爆防止）
    setTimeout(() => {
      if (html5QrCode) {
        try { html5QrCode.resume(); } catch(e) {}
      }
      isProcessing = false; // ディレイ後にロック解除
    }, 500);
  }
</script>

</body>
</html>
